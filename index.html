<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&K Service – Kalkulation & Rechnung</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;padding:20px;background:#f4f4f4}
header{background:#1b5e20;color:white;padding:15px;margin-bottom:20px}
.card{background:white;padding:20px;margin-bottom:20px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
input,select{padding:8px;margin:4px 0;width:100%}
button{padding:10px;margin-top:8px;background:#1b5e20;color:white;border:none;border-radius:6px;cursor:pointer}
table{width:100%;margin-top:10px;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:6px;text-align:left}
.total{font-weight:bold;font-size:18px;margin-top:10px}
</style>
</head>

<body>

<header>
<h1>C&K Service</h1>
<div style="font-size:14px;">Service rund ums Haus</div>
</header>

<div class="card">

<h3>Kundendaten</h3>
<input id="kundeName" placeholder="Name">
<input id="kundeAdresse" placeholder="Adresse">
<input id="kundeEmail" placeholder="E-Mail">

<h3>Kategorie</h3>
<select id="kategorie" onchange="zeigeKategorie()">
<option value="">Bitte wählen</option>
<option value="Hecke">Hecke schneiden</option>
<option value="Maler">Malerarbeiten</option>
<option value="Rasen">Rasen mähen</option>
<option value="Boden">Boden legen</option>
<option value="Elektrik">Elektrik</option>
</select>

<div id="kalkulation"></div>

<button onclick="positionHinzufuegen()">Position hinzufügen</button>

</div>

<div class="card">
<h3>Positionsliste</h3>
<table id="positionsTabelle">
<tr><th>Leistung</th><th>Netto</th></tr>
</table>

<div class="total" id="gesamt"></div>

<button onclick="rechnungErstellen()">Rechnung als PDF</button>
</div>

<script>

let positionen=[];
let mwstSatz=0.19;

function zeigeKategorie(){
let kat=document.getElementById("kategorie").value;
let html="";

if(kat==="Hecke"){
html=`
<h4>Hecke – Vollkalkulation</h4>
<input id="meter" placeholder="Meter">
<input id="hoehe" placeholder="Höhe (m)">
<input id="breite" placeholder="Breite (m)">
<input id="faktor" placeholder="Schwierigkeitsfaktor (1-2)">
<input id="stunden" placeholder="Arbeitsstunden">
<input id="stundenPreis" placeholder="Stundensatz">
<input id="entsorgung" placeholder="Entsorgung">
<input id="maschinen" placeholder="Maschinenkosten">
<input id="fahrt" placeholder="Anfahrt">
<input id="geruest" placeholder="Gerüst / Absicherung">
<input id="rabatt" placeholder="Rabatt %">
`;
}

if(kat==="Maler"){
html=`
<h4>Malerarbeiten – Detail</h4>
<input id="qm" placeholder="m² Fläche">
<input id="materialQm" placeholder="Material €/m²">
<input id="grundierungQm" placeholder="Grundierung €/m²">
<input id="spachtel" placeholder="Spachtelarbeiten">
<input id="stunden" placeholder="Arbeitsstunden">
<input id="stundenPreis" placeholder="Stundensatz">
<input id="geruest" placeholder="Gerüst">
<input id="rabatt" placeholder="Rabatt %">
`;
}

if(kat==="Rasen"){
html=`
<h4>Rasenpflege – Detail</h4>
<input id="flaeche" placeholder="Fläche m²">
<input id="entsorgung" placeholder="Entsorgung">
<input id="maschinen" placeholder="Maschinenkosten">
<input id="duenger" placeholder="Düngung">
<input id="stunden" placeholder="Arbeitsstunden">
<input id="stundenPreis" placeholder="Stundensatz">
<input id="rabatt" placeholder="Rabatt %">
`;
}

if(kat==="Boden"){
html=`
<h4>Boden legen – Detail</h4>
<input id="qm" placeholder="m²">
<input id="material" placeholder="Materialkosten">
<input id="kleber" placeholder="Kleber / Zubehör">
<input id="trittschall" placeholder="Trittschalldämmung">
<input id="stunden" placeholder="Arbeitsstunden">
<input id="stundenPreis" placeholder="Stundensatz">
<input id="rabatt" placeholder="Rabatt %">
`;
}

if(kat==="Elektrik"){
html=`
<h4>Elektrik – Detail</h4>
<input id="material" placeholder="Materialkosten">
<input id="verteiler" placeholder="Verteiler / Sicherungskasten">
<input id="messung" placeholder="Messprotokoll">
<input id="fahrt" placeholder="Anfahrt">
<input id="stunden" placeholder="Arbeitsstunden">
<input id="stundenPreis" placeholder="Stundensatz">
<input id="rabatt" placeholder="Rabatt %">
`;
}

document.getElementById("kalkulation").innerHTML=html;
}

function positionHinzufuegen(){

let kat=document.getElementById("kategorie").value;
let netto=0;

let std=parseFloat(document.getElementById("stunden")?.value)||0;
let stdPreis=parseFloat(document.getElementById("stundenPreis")?.value)||0;
netto+=std*stdPreis;

let felder=["meter","hoehe","breite","faktor","entsorgung","maschinen","fahrt","geruest","qm","materialQm","grundierungQm","spachtel","flaeche","duenger","material","kleber","trittschall","verteiler","messung"];

felder.forEach(id=>{
if(document.getElementById(id)){
let val=parseFloat(document.getElementById(id).value)||0;
netto+=val;
}
});

let rabatt=parseFloat(document.getElementById("rabatt")?.value)||0;
netto=netto*(1-rabatt/100);

positionen.push({leistung:kat,netto:netto});
renderPositionen();
}

function renderPositionen(){
let table=document.getElementById("positionsTabelle");
table.innerHTML="<tr><th>Leistung</th><th>Netto</th></tr>";

let summe=0;
positionen.forEach(p=>{
table.innerHTML+=`<tr><td>${p.leistung}</td><td>${p.netto.toFixed(2)} €</td></tr>`;
summe+=p.netto;
});

let mwst=summe*mwstSatz;
let brutto=summe+mwst;

document.getElementById("gesamt").innerHTML=
"Netto: "+summe.toFixed(2)+" €<br>"+
"MwSt 19%: "+mwst.toFixed(2)+" €<br>"+
"Brutto: "+brutto.toFixed(2)+" €";
}

async function rechnungErstellen(){

const { jsPDF } = window.jspdf;
const doc=new jsPDF();

let name=document.getElementById("kundeName").value;
let adresse=document.getElementById("kundeAdresse").value;

let datum=new Date();
let nummer="R-"+datum.getFullYear()+"-"+Date.now().toString().slice(-4);

doc.setFontSize(18);
doc.text("C&K Service",20,20);

doc.setFontSize(11);
doc.text("Service rund ums Haus",20,26);

doc.setFontSize(9);
doc.text("Musterstraße 1",20,34);
doc.text("12345 Musterstadt",20,39);
doc.text("Tel: 01234 567890",20,44);

doc.setFontSize(10);
doc.text("Rechnung "+nummer,140,20);
doc.text("Datum: "+datum.toLocaleDateString(),140,26);

doc.setFontSize(10);
doc.text("Rechnung an:",20,60);
doc.text(name,20,67);
doc.text(adresse,20,73);

doc.line(20,80,190,80);

let y=90;
let summe=0;

positionen.forEach(p=>{
doc.text(p.leistung,20,y);
doc.text(p.netto.toFixed(2)+" €",170,y,{align:"right"});
y+=8;
summe+=p.netto;
});

doc.line(20,y,190,y);
y+=12;

let mwst=summe*0.19;
let brutto=summe+mwst;

/* --- SUMMENBLOCK RECHTS --- */

doc.setFontSize(10);

doc.text("Netto:",130,y);
doc.text(summe.toFixed(2)+" €",170,y,{align:"right"});
y+=8;

doc.text("MwSt 19%:",130,y);
doc.text(mwst.toFixed(2)+" €",170,y,{align:"right"});
y+=8;

doc.setFontSize(12);
doc.text("Gesamtbetrag:",130,y);
doc.text(brutto.toFixed(2)+" €",170,y,{align:"right"});
y+=15;

doc.setFontSize(9);
doc.text("Zahlbar innerhalb von 14 Tagen ohne Abzug.",20,y);

doc.save("Rechnung_"+nummer+".pdf");
}
