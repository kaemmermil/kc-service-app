<div class="card">
<h3>Kundendaten</h3>
<label>Kunde<input id="customer"></label>
<label>Adresse<input id="address"></label>
<label>Angebotsnummer<input id="offerNumber" readonly></label>
</div>

<div class="card">
<h3>Leistung</h3>
<label>Heckenlänge (m)<input type="number" id="length" oninput="calculate()"></label>
<label>Preis pro Meter (€)<input type="number" id="ppm" oninput="calculate()"></label>
<label>Entsorgung (m³)<input type="number" id="volume" oninput="calculate()"></label>
<label>Entsorgung €/m³<input type="number" id="disposal" oninput="calculate()"></label>
<label>Anfahrt (€)<input type="number" id="travel" oninput="calculate()"></label>
<label>Hebebühne Stunden<input type="number" id="liftH" oninput="calculate()"></label>
<label>Hebebühne €/h<input type="number" id="liftP" oninput="calculate()"></label>

<div class="result">
Netto: <span id="net">0.00</span> €<br>
MwSt (19%): <span id="tax">0.00</span> €<br>
Brutto: <span id="gross">0.00</span> €
</div>

<button onclick="saveProject()">Projekt speichern</button>
<button onclick="generatePDF()">PDF-Angebot erstellen</button>
</div>

<script>

function generateOfferNumber(){
 let counter = localStorage.getItem("offerCounter") || 1;
 let year = new Date().getFullYear();
 document.getElementById("offerNumber").value = year + "-" + String(counter).padStart(4,'0');
}

function increaseOfferCounter(){
 let counter = localStorage.getItem("offerCounter") || 1;
 counter++;
 localStorage.setItem("offerCounter", counter);
}

function calculate(){
 let length = parseFloat(document.getElementById("length").value)||0;
 let ppm = parseFloat(document.getElementById("ppm").value)||0;
 let vol = parseFloat(document.getElementById("volume").value)||0;
 let disp = parseFloat(document.getElementById("disposal").value)||0;
 let travel = parseFloat(document.getElementById("travel").value)||0;
 let liftH = parseFloat(document.getElementById("liftH").value)||0;
 let liftP = parseFloat(document.getElementById("liftP").value)||0;

 let net = (length*ppm)+(vol*disp)+travel+(liftH*liftP);
 let tax = net*0.19;
 let gross = net+tax;

 document.getElementById("net").innerText = net.toFixed(2);
 document.getElementById("tax").innerText = tax.toFixed(2);
 document.getElementById("gross").innerText = gross.toFixed(2);
}

function saveProject(){
 let data = {
   customer: document.getElementById("customer").value,
   address: document.getElementById("address").value,
   gross: document.getElementById("gross").innerText
 };
 localStorage.setItem("KC_Project", JSON.stringify(data));
 alert("Projekt gespeichert.");
}

function generatePDF(){
 let offer = document.getElementById("offerNumber").value;
 let customer = document.getElementById("customer").value;
 let address = document.getElementById("address").value;
 let gross = document.getElementById("gross").innerText;

 let text = "Angebot\n\nNr: " + offer + "\n\nKunde: " + customer + "\nAdresse: " + address + "\n\nBruttosumme: " + gross + " €";

 let blob = new Blob([text], {type:"application/pdf"});
 let link = document.createElement("a");
 link.href = URL.createObjectURL(blob);
 link.download = "Angebot_" + offer + ".pdf";
 link.click();

 increaseOfferCounter();
 generateOfferNumber();
}

generateOfferNumber();

</script>
