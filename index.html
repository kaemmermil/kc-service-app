<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K&C Service – Kalkulation & Rechnung</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#f4f4f4;
}

header{
    background:#1b5e20;
    color:white;
    padding:15px;
}

.card{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, select{
    padding:8px;
    margin:5px 0;
    width:100%;
}

button{
    padding:10px;
    margin-top:10px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.result{
    font-weight:bold;
    font-size:18px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>K&C Service</h1>
</header>

<div class="card">

<h3>Kunde</h3>
<input id="kundeName" placeholder="Name">
<input id="kundeAdresse" placeholder="Adresse">
<input id="kundeEmail" placeholder="E-Mail">

<h3>Arbeitskategorie</h3>
<select id="kategorie" onchange="zeigeKategorie()">
<option value="">Bitte wählen</option>
<option value="hecke">Hecke schneiden</option>
<option value="maler">Malerarbeiten</option>
<option value="rasen">Rasen mähen</option>
<option value="boden">Boden legen</option>
<option value="elektrik">Elektrik</option>
</select>

<div id="kalkulation"></div>

<div class="result" id="ergebnis"></div>

<button onclick="berechnen()">Preis berechnen</button>
<button onclick="rechnungErstellen()">Rechnung erstellen (PDF)</button>
<button onclick="angebotSenden()">Angebot per Mail senden</button>

</div>

<script>

let aktuellerPreis = 0;

function zeigeKategorie(){

let kat = document.getElementById("kategorie").value;
let html = "";

if(kat==="hecke"){
html = `
<h4>Hecke schneiden</h4>
<select id="heckeArt">
<option value="1">Leicht (1)</option>
<option value="1.3">Mittel (1.3)</option>
<option value="1.6">Schwer (1.6)</option>
</select>
<select id="heckeModus">
<option value="zeit">Nach Zeit</option>
<option value="menge">Nach Meter</option>
</select>
<input id="stunden" placeholder="Stunden">
<input id="meter" placeholder="Meter">
<input id="stundenPreis" placeholder="Stundensatz (€)">
<input id="meterPreis" placeholder="Preis pro Meter (€)">
`;
}

if(kat==="maler"){
html = `
<h4>Malerarbeiten</h4>
<select id="malerModus">
<option value="zeit">Nach Zeit</option>
<option value="flaeche">Nach m²</option>
</select>
<input id="stunden" placeholder="Stunden">
<input id="qm" placeholder="Quadratmeter">
<input id="stundenPreis" placeholder="Stundensatz (€)">
<input id="qmPreis" placeholder="Preis pro m² (€)">
`;
}

if(kat==="rasen"){
html = `
<h4>Rasen mähen</h4>
<select id="rasenModus">
<option value="zeit">Nach Zeit</option>
<option value="flaeche">Nach m²</option>
</select>
<input id="stunden" placeholder="Stunden">
<input id="qm" placeholder="Fläche m²">
<input id="stundenPreis" placeholder="Stundensatz (€)">
<input id="qmPreis" placeholder="Preis pro m² (€)">
`;
}

if(kat==="boden"){
html = `
<h4>Boden legen</h4>
<select id="bodenModus">
<option value="zeit">Nach Zeit</option>
<option value="flaeche">Nach m²</option>
</select>
<input id="stunden" placeholder="Stunden">
<input id="qm" placeholder="Quadratmeter">
<input id="stundenPreis" placeholder="Stundensatz (€)">
<input id="qmPreis" placeholder="Preis pro m² (€)">
`;
}

if(kat==="elektrik"){
html = `
<h4>Elektrik</h4>
<input id="stunden" placeholder="Stunden">
<input id="stundenPreis" placeholder="Stundensatz (€)">
`;
}

document.getElementById("kalkulation").innerHTML = html;
document.getElementById("ergebnis").innerHTML = "";
}

function berechnen(){

let kat = document.getElementById("kategorie").value;
let preis = 0;

if(kat==="hecke"){
let art = parseFloat(document.getElementById("heckeArt").value);
let modus = document.getElementById("heckeModus").value;

if(modus==="zeit"){
let std = parseFloat(document.getElementById("stunden").value) || 0;
let stdPreis = parseFloat(document.getElementById("stundenPreis").value) || 0;
preis = std * stdPreis * art;
}else{
let meter = parseFloat(document.getElementById("meter").value) || 0;
let meterPreis = parseFloat(document.getElementById("meterPreis").value) || 0;
preis = meter * meterPreis * art;
}
}

if(kat==="maler" || kat==="rasen" || kat==="boden"){
let modus = document.querySelector("select[id$='Modus']").value;

if(modus==="zeit"){
let std = parseFloat(document.getElementById("stunden").value) || 0;
let stdPreis = parseFloat(document.getElementById("stundenPreis").value) || 0;
preis = std * stdPreis;
}else{
let qm = parseFloat(document.getElementById("qm").value) || 0;
let qmPreis = parseFloat(document.getElementById("qmPreis").value) || 0;
preis = qm * qmPreis;
}
}

if(kat==="elektrik"){
let std = parseFloat(document.getElementById("stunden").value) || 0;
let stdPreis = parseFloat(document.getElementById("stundenPreis").value) || 0;
preis = std * stdPreis;
}

aktuellerPreis = preis;
document.getElementById("ergebnis").innerHTML =
"Gesamtpreis: " + preis.toFixed(2) + " €";
}

function rechnungErstellen(){

let name = document.getElementById("kundeName").value;
let adresse = document.getElementById("kundeAdresse").value;
let datum = new Date().toLocaleDateString();

let rechnungsNummer = "R-" + Date.now();

let inhalt = `
Rechnung ${rechnungsNummer}
Datum: ${datum}

Kunde:
${name}
${adresse}

Leistung: ${document.getElementById("kategorie").value}

Gesamtbetrag: ${aktuellerPreis.toFixed(2)} €
`;

let blob = new Blob([inhalt], {type:"text/plain"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "Rechnung_" + rechnungsNummer + ".txt";
a.click();
}

function angebotSenden(){

let email = document.getElementById("kundeEmail").value;
let text = "Angebot von K&C Service: " + aktuellerPreis.toFixed(2) + " €";

window.location.href =
"mailto:" + email +
"?subject=Angebot K&C Service" +
"&body=" + encodeURIComponent(text);
}

</script>

</body>
</html>
