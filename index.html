<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K&C Service – Kalkulation & Rechnung</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f4f4f4;
}

header{
    background:#1b5e20;
    color:white;
    padding:15px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, select{
    padding:8px;
    margin:5px 0;
    width:100%;
}

button{
    padding:10px;
    margin-top:10px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.result{
    font-weight:bold;
    font-size:18px;
    margin-top:10px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<header>
<h1>K&C Service</h1>
</header>

<div class="card">

<h3>Kundendaten</h3>
<input id="kundeName" placeholder="Name">
<input id="kundeAdresse" placeholder="Adresse">
<input id="kundeEmail" placeholder="E-Mail">

<h3>Arbeitskategorie</h3>
<select id="kategorie" onchange="zeigeKategorie()">
<option value="">Bitte wählen</option>
<option value="Hecke schneiden">Hecke schneiden</option>
<option value="Malerarbeiten">Malerarbeiten</option>
<option value="Rasen mähen">Rasen mähen</option>
<option value="Boden legen">Boden legen</option>
<option value="Elektrik">Elektrik</option>
</select>

<div id="kalkulation"></div>

<div class="result" id="ergebnis"></div>

<button onclick="berechnen()">Preis berechnen</button>
<button onclick="rechnungErstellen()">Rechnung als PDF</button>
<button onclick="angebotSenden()">Angebot per Mail senden</button>

</div>

<script>

let aktuellerNetto = 0;

function zeigeKategorie(){

let kat = document.getElementById("kategorie").value;
let html = "";

if(kat==="Hecke schneiden"){
html = `
<h4>Hecke schneiden</h4>
<select id="heckeFaktor">
<option value="1">Leicht</option>
<option value="1.3">Mittel</option>
<option value="1.6">Schwer</option>
</select>
<select id="heckeModus">
<option value="zeit">Nach Zeit</option>
<option value="menge">Nach Meter</option>
</select>
<input id="stunden" placeholder="Stunden">
<input id="meter" placeholder="Meter">
<input id="stundenPreis" placeholder="Stundensatz (€)">
<input id="meterPreis" placeholder="Preis pro Meter (€)">
`;
}

if(kat==="Malerarbeiten" || kat==="Rasen mähen" || kat==="Boden legen"){
html = `
<h4>${kat}</h4>
<select id="modus">
<option value="zeit">Nach Zeit</option>
<option value="flaeche">Nach m²</option>
</select>
<input id="stunden" placeholder="Stunden">
<input id="qm" placeholder="Quadratmeter">
<input id="stundenPreis" placeholder="Stundensatz (€)">
<input id="qmPreis" placeholder="Preis pro m² (€)">
`;
}

if(kat==="Elektrik"){
html = `
<h4>Elektrik</h4>
<input id="stunden" placeholder="Stunden">
<input id="stundenPreis" placeholder="Stundensatz (€)">
`;
}

document.getElementById("kalkulation").innerHTML = html;
document.getElementById("ergebnis").innerHTML = "";
}

function berechnen(){

let kat = document.getElementById("kategorie").value;
let preis = 0;

if(kat==="Hecke schneiden"){
let faktor = parseFloat(document.getElementById("heckeFaktor").value);
let modus = document.getElementById("heckeModus").value;

if(modus==="zeit"){
let std = parseFloat(document.getElementById("stunden").value) || 0;
let stdPreis = parseFloat(document.getElementById("stundenPreis").value) || 0;
preis = std * stdPreis * faktor;
}else{
let meter = parseFloat(document.getElementById("meter").value) || 0;
let meterPreis = parseFloat(document.getElementById("meterPreis").value) || 0;
preis = meter * meterPreis * faktor;
}
}

if(kat==="Malerarbeiten" || kat==="Rasen mähen" || kat==="Boden legen"){
let modus = document.getElementById("modus").value;

if(modus==="zeit"){
let std = parseFloat(document.getElementById("stunden").value) || 0;
let stdPreis = parseFloat(document.getElementById("stundenPreis").value) || 0;
preis = std * stdPreis;
}else{
let qm = parseFloat(document.getElementById("qm").value) || 0;
let qmPreis = parseFloat(document.getElementById("qmPreis").value) || 0;
preis = qm * qmPreis;
}
}

if(kat==="Elektrik"){
let std = parseFloat(document.getElementById("stunden").value) || 0;
let stdPreis = parseFloat(document.getElementById("stundenPreis").value) || 0;
preis = std * stdPreis;
}

aktuellerNetto = preis;

let mwst = preis * 0.19;
let brutto = preis + mwst;

document.getElementById("ergebnis").innerHTML =
"Netto: " + preis.toFixed(2) + " €<br>" +
"MwSt (19%): " + mwst.toFixed(2) + " €<br>" +
"Brutto: " + brutto.toFixed(2) + " €";
}

async function rechnungErstellen(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let name = document.getElementById("kundeName").value;
let adresse = document.getElementById("kundeAdresse").value;
let kategorie = document.getElementById("kategorie").value;

let datum = new Date();
let nummer = "R-" + datum.getFullYear() + "-" + Date.now().toString().slice(-4);

let netto = aktuellerNetto;
let mwst = netto * 0.19;
let brutto = netto + mwst;

doc.setFontSize(18);
doc.text("K&C Service", 20, 20);

doc.setFontSize(12);
doc.text("Rechnung", 150, 20);
doc.setFontSize(10);
doc.text("Rechnungsnr: " + nummer, 150, 26);
doc.text("Datum: " + datum.toLocaleDateString(), 150, 32);

doc.text("Rechnung an:", 20, 45);
doc.text(name, 20, 52);
doc.text(adresse, 20, 58);

doc.line(20, 70, 190, 70);

doc.text("Leistung: " + kategorie, 20, 80);

doc.text("Netto:", 140, 100);
doc.text(netto.toFixed(2) + " €", 170, 100);

doc.text("MwSt 19%:", 140, 108);
doc.text(mwst.toFixed(2) + " €", 170, 108);

doc.setFontSize(12);
doc.text("Gesamtbetrag:", 140, 120);
doc.text(brutto.toFixed(2) + " €", 170, 120);

doc.line(20, 130, 190, 130);

doc.setFontSize(9);
doc.text("Zahlbar innerhalb von 14 Tagen ohne Abzug.", 20, 140);

doc.save("Rechnung_" + nummer + ".pdf");
}

function angebotSenden(){

let email = document.getElementById("kundeEmail").value;
let brutto = aktuellerNetto * 1.19;

let text = "Angebot von K&C Service\n\n" +
"Leistung: " + document.getElementById("kategorie").value + "\n" +
"Gesamtbetrag: " + brutto.toFixed(2) + " €";

window.location.href =
"mailto:" + email +
"?subject=Angebot K&C Service" +
"&body=" + encodeURIComponent(text);
}

</script>

</body>
</html>
